services:
  mysql:
    image: mysql:8.0
    container_name: teamflow-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: teamflow
      MYSQL_USER: teamflow
      MYSQL_PASSWORD: teamflow
    volumes:
      - teamflow_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uteamflow", "-pteamflow"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  teamflow_mysql_data:
